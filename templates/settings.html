<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Settings</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f5fafc] font-sans min-h-screen p-4">



<h2 class="text-2xl font-bold text-[#093045] mb-4">System Settings</h2>

<div class="flex gap-4 mb-4">
  <button onclick="openInst()" class="bg-[#0d755f] text-white px-4 py-2 rounded hover:bg-[#1b7a74]">Add Institution</button>
  <button onclick="openCourse()" class="bg-[#0d755f] text-white px-4 py-2 rounded hover:bg-[#1b7a74]">Add Course</button>
</div>

<!-- Institution Modal -->
<div id="instModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex justify-center items-center p-4">
  <div class="bg-white rounded-lg p-6 w-full max-w-md space-y-2">
    <h3 class="text-[#093045] font-bold text-lg">Add Institution</h3>
    <form method="POST" class="space-y-2">
      <input type="text" name="institution_name" placeholder="Institution Name" required class="w-full border border-gray-300 rounded p-2">
      <input type="text" name="inst_short_name" placeholder="Short Name" required class="w-full border border-gray-300 rounded p-2">
      <div class="flex justify-end gap-2">
        <button type="submit" class="bg-[#0d755f] text-white px-4 py-2 rounded hover:bg-[#1b7a74]">Save</button>
        <button type="button" onclick="closeInst()" class="border border-[#f5fafc] px-4 py-2 rounded">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- Course Modal -->
<div id="courseModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex justify-center items-center p-4">
  <div class="bg-white rounded-lg p-6 w-full max-w-md space-y-2">
    <h3 class="text-[#093045] font-bold text-lg">Add Course</h3>
    <form method="POST" class="space-y-2">
      <input type="text" name="course_name" placeholder="Course Name" required class="w-full border border-gray-300 rounded p-2">
      <input type="text" name="course_short_name" placeholder="Short Name" required class="w-full border border-gray-300 rounded p-2">
      <input type="text" name="duration" placeholder="Duration" class="w-full border border-gray-300 rounded p-2">
      <div class="flex justify-end gap-2">
        <button type="submit" class="bg-[#0d755f] text-white px-4 py-2 rounded hover:bg-[#1b7a74]">Save</button>
        <button type="button" onclick="closeCourse()" class="border border-[#f5fafc] px-4 py-2 rounded">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
