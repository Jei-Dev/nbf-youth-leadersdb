<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Youth Leaders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#f5fafc] font-sans min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="bg-[#1b7a74] text-white p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">Youth Leaders Dashboard</h1>
    <div>
      Logged in as: {{ session['role'] }}
      <a href="/logout" class="ml-4 underline">Logout</a>
    </div>
  </nav>

  <div class="container mx-auto p-4 flex-1">

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-white p-4 rounded-lg shadow hover:shadow-lg transition text-center">
        <h2 class="text-[#093045] text-lg font-semibold">Total Enrollments</h2>
        <p class="text-3xl font-bold">{{ total_enrollments }}</p>
      </div>
      <div class="bg-white p-4 rounded-lg shadow hover:shadow-lg transition text-center">
        <h2 class="text-[#093045] text-lg font-semibold">Total Graduates</h2>
        <p class="text-3xl font-bold">{{ total_graduates }}</p>
      </div>
      <div class="bg-white p-4 rounded-lg shadow hover:shadow-lg transition text-center">
        <h2 class="text-[#093045] text-lg font-semibold">Pending Graduations</h2>
        <p class="text-3xl font-bold">{{ pending_graduates }}</p>
      </div>
    </div>

    <!-- Graduates Table -->
    <div class="bg-white rounded-lg shadow p-4 mb-6">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-2">
        <h2 class="text-[#093045] font-bold text-lg">Graduates List</h2>
        <input 
          type="text" 
          id="searchInput" 
          placeholder="Search graduates..." 
          class="border border-gray-300 rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-[#18d9b0]"
        >
      </div>
      <div class="overflow-y-auto max-h-96">
        <table id="graduatesTable" class="min-w-full border border-gray-200">
          <thead class="bg-[#f5fafc]">
            <tr>
              <th class="py-2 px-4 border-b text-center">Graduate ID</th>
              <th class="py-2 px-4 border-b text-center">Name</th>
              <th class="py-2 px-4 border-b text-center">Institution</th>
              <th class="py-2 px-4 border-b text-center">Course</th>
              <th class="py-2 px-4 border-b text-center">Graduation Date</th>
              <th class="py-2 px-4 border-b text-center">Action</th>
            </tr>
          </thead>
          <tbody>
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Graduates Bar Chart -->
    <div class="bg-white p-4 rounded-lg shadow">
      <h2 class="text-[#093045] font-bold mb-2">Graduates per Month</h2>
      <div class="relative h-64">
        <canvas id="graduatesChart"></canvas>
      </div>
    </div>

  </div>

  <!-- Scripts -->
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
