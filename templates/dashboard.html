<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Youth Leaders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-[#f5fafc] font-sans min-h-screen flex flex-col">

<!-- NAVBAR -->
<nav class="bg-[#1b7a74] text-white p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">Youth Leaders Dashboard</h1>

  <div class="relative">
    <button id="settingsBtn" class="focus:outline-none">
      <!-- Gear Icon -->
      <svg xmlns="http://www.w3.org/2000/svg"
           class="h-6 w-6 cursor-pointer hover:rotate-90 transition-transform duration-300"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M11.983 2.25c.27 0 .533.11.725.302l.89.89a1.02 1.02 0 001.054.23l1.192-.397a1 1 0 011.26.63l.397 1.192c.14.42.48.754.9.9l1.192.397a1 1 0 01.63 1.26l-.397 1.192a1.02 1.02 0 00.23 1.054l.89.89a1 1 0 010 1.45l-.89.89a1.02 1.02 0 00-.23 1.054l.397 1.192a1 1 0 01-.63 1.26l-1.192.397a1.02 1.02 0 00-.9.9l-.397 1.192a1 1 0 01-1.26.63l-1.192-.397a1.02 1.02 0 00-1.054.23l-.89.89a1 1 0 01-1.45 0l-.89-.89a1.02 1.02 0 00-1.054-.23l-1.192.397a1 1 0 01-1.26-.63l-.397-1.192a1.02 1.02 0 00-.9-.9l-1.192-.397a1 1 0 01-.63-1.26l.397-1.192a1.02 1.02 0 00-.23-1.054l-.89-.89a1 1 0 010-1.45l.89-.89a1.02 1.02 0 00.23-1.054l-.397-1.192a1 1 0 01.63-1.26l1.192-.397a1.02 1.02 0 00.9-.9l.397-1.192a1 1 0 011.26-.63l1.192.397c.374.125.786.028 1.054-.23l.89-.89a1 1 0 01.725-.302z"/>
      </svg>
    </button>

    <div id="dropdownMenu"
         class="hidden absolute right-0 mt-2 w-40 bg-white text-[#093045] rounded-lg shadow-lg overflow-hidden">

      <a href="/manage_users"
         class="flex items-center gap-2 px-4 py-2 hover:bg-gray-100">
        ➕ <span>User</span>
      </a>

      <a href="/login"
         class="flex items-center gap-2 px-4 py-2 hover:bg-gray-100">
        ⏻ <span>Logout</span>
      </a>

    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mx-auto p-6 flex-1">

  <!-- SUMMARY CARDS -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
    <div class="bg-white p-4 rounded-lg shadow text-center">
      <h2 class="text-[#093045] text-lg font-semibold">Total Enrollments</h2>
      <p class="text-3xl font-bold">{{ total_enrollments }}</p>
    </div>

    <div class="bg-white p-4 rounded-lg shadow text-center">
      <h2 class="text-[#093045] text-lg font-semibold">Total Graduates</h2>
      <p class="text-3xl font-bold">{{ total_graduates }}</p>
    </div>

    <div class="bg-white p-4 rounded-lg shadow text-center">
      <h2 class="text-[#093045] text-lg font-semibold">Pending Graduations</h2>
      <p class="text-3xl font-bold">{{ pending_graduates }}</p>
    </div>
  </div>

  <!-- SEARCH + CLOSE ABOVE BUTTONS -->
  <div class="flex justify-between items-center mb-4">
    <h2 id="sectionTitle" class="text-[#093045] font-bold text-lg"></h2>
    <div class="flex gap-2">
      <input type="text" id="searchInput" placeholder="Search..."
             class="border border-gray-300 rounded px-3 py-1">
      <button onclick="closeSection()"
              class="text-gray-500 hover:text-red-500 text-lg px-2">✖</button>
    </div>
  </div>

  <!-- VIEW BUTTONS -->
  <div class="flex gap-4 mb-6">
    <button onclick="loadGraduates()"
      class="bg-[#2054a8] text-white px-4 py-2 rounded hover:bg-blue-700 transition">
      View Graduates
    </button>

    <button onclick="loadEnrollments()"
      class="bg-[#1b7a74] text-white px-4 py-2 rounded hover:bg-[#155e59] transition">
      View Enrollments
    </button>

    <button onclick="loadUsers()"
      class="bg-[#093045] text-white px-4 py-2 rounded hover:bg-[#06212f] transition">
      View Users
    </button>
  </div>

  <!-- DYNAMIC TABLE SECTION -->
  <div id="dynamicSection" class="hidden bg-white rounded-lg shadow p-6 mb-8">

    <div class="overflow-y-auto max-h-96">
      <table class="min-w-full border border-gray-200">
        <thead class="bg-[#f5fafc]" id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- CHARTS SECTION -->
  <div id="chartsSection" class="grid grid-cols-1 md:grid-cols-2 gap-8">

    <div class="bg-white p-6 rounded-xl shadow-md">
      <h3 class="text-lg font-bold mb-4 text-[#093045]">
        Graduates Per Institution
      </h3>
      <canvas id="institutionChart"></canvas>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-md">
      <h3 class="text-lg font-bold mb-4 text-[#093045]">
        Graduates Per Course Per Year
      </h3>
      <canvas id="courseYearChart"></canvas>
    </div>

  </div>
</div>

<!-- SCRIPTS -->
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
