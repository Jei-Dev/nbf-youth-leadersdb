<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Youth Leaders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="flex bg-[#f5fafc] font-sans h-screen overflow-hidden">

  <!-- ================= SIDEBAR ================= -->
  {% include "partials/sidebar.html" %}

  <!-- ================= MAIN CONTENT ================= -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- NAVBAR -->
    <nav class="bg-[#1b7a74] text-white p-2 flex justify-between items-center">
      <h1 class="text-xl font-bold">Youth Leaders Dashboard</h1>

      <div class="relative">
        <button id="settingsBtn" class="focus:outline-none">
          <svg xmlns="http://www.w3.org/2000/svg"
               class="h-6 w-6 cursor-pointer hover:rotate-90 transition-transform duration-300"
               fill="none"
               viewBox="0 0 24 24"
               stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M11.983 2.25c.27 0 .533.11.725.302l.89.89a1.02 1.02 0 001.054.23l1.192-.397a1 1 0 011.26.63l.397 1.192c.14.42.48.754.9.9l1.192.397a1 1 0 01.63 1.26l-.397 1.192a1.02 1.02 0 00.23 1.054l.89.89a1 1 0 010 1.45l-.89.89a1.02 1.02 0 00-.23 1.054l.397 1.192a1 1 0 01-.63 1.26l-1.192.397a1.02 1.02 0 00-.9.9l-.397 1.192a1 1 0 01-1.26.63l-1.192-.397a1.02 1.02 0 00-1.054.23l-.89.89a1 1 0 01-1.45 0l-.89-.89a1.02 1.02 0 00-1.054-.23l-1.192.397a1 1 0 01-1.26-.63l-.397-1.192a1.02 1.02 0 00-.9-.9l-1.192-.397a1 1 0 01-.63-1.26l.397-1.192a1.02 1.02 0 00-.23-1.054l-.89-.89a1 1 0 010-1.45l.89-.89a1.02 1.02 0 00.23-1.054l-.397-1.192a1 1 0 01.63-1.26l1.192-.397a1.02 1.02 0 00.9-.9l.397-1.192a1 1 0 011.26-.63l1.192.397c.374.125.786.028 1.054-.23l.89-.89a1 1 0 01.725-.302z"/>
          </svg>
        </button>

        <div id="dropdownMenu"
             class="hidden absolute right-0 mt-1 w-36 bg-white text-[#093045] rounded-lg shadow overflow-hidden">
          <a href="/manage_users"
             class="flex items-center gap-1 px-3 py-1 hover:bg-gray-100">
            ➕ <span>User</span>
          </a>
          <a href="/login"
             class="flex items-center gap-1 px-3 py-1 hover:bg-gray-100">
            ⏻ <span>Logout</span>
          </a>
        </div>
      </div>
    </nav>

    <!-- MAIN CONTENT AREA -->
    <div class="container mx-auto p-4 flex-1 flex flex-col overflow-hidden">

      <!-- SUMMARY CARDS -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
        <div class="bg-white p-4 rounded-lg shadow text-center">
          <h2 class="text-[#093045] text-base font-semibold">Total Enrollments</h2>
          <p class="text-2xl font-bold">{{ total_enrollments }}</p>
        </div>

        <div class="bg-white p-4 rounded-lg shadow text-center">
          <h2 class="text-[#093045] text-base font-semibold">Total Graduates</h2>
          <p class="text-2xl font-bold">{{ total_graduates }}</p>
        </div>

        <div class="bg-white p-4 rounded-lg shadow text-center">
          <h2 class="text-[#093045] text-base font-semibold">Pending Graduations</h2>
          <p class="text-2xl font-bold">{{ pending_graduates }}</p>
        </div>
      </div>

      <!-- SEARCH + CLOSE -->
      <div class="flex justify-between items-center mb-2">
        <h2 id="sectionTitle" class="text-[#093045] font-bold text-base"></h2>
        <div class="flex gap-1">
          <input type="text" id="searchInput" placeholder="Search..."
                 class="border border-gray-300 rounded px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-[#0d755f]">
          <button onclick="closeSection()"
                  class="text-gray-500 hover:text-red-500 text-lg px-1">✖</button>
        </div>
      </div>

      <!-- VIEW BUTTONS -->
      <div class="flex gap-2 mb-4">
        <button onclick="loadGraduates()"
          class="bg-[#2054a8] text-white px-3 py-1 rounded hover:bg-blue-700 transition text-sm">
          View Graduates
        </button>

        <button onclick="loadEnrollments()"
          class="bg-[#1b7a74] text-white px-3 py-1 rounded hover:bg-[#155e59] transition text-sm">
          View Enrollments
        </button>

        <button onclick="loadUsers()"
          class="bg-[#093045] text-white px-3 py-1 rounded hover:bg-[#06212f] transition text-sm">
          View Users
        </button>
      </div>

      <!-- DYNAMIC TABLE SECTION -->
      <div id="dynamicSection" class="hidden bg-white rounded-lg shadow p-2 mb-4">
        <div class="overflow-y-auto max-h-[50vh] border border-gray-200 rounded">
          <table class="min-w-full border-collapse text-left text-sm">
            <thead id="tableHead" class="bg-[#f5fafc] sticky top-0 z-10 text-left"></thead>
            <tbody id="tableBody" class="text-left text-sm"></tbody>
          </table>
        </div>
      </div>

      <!-- CHARTS SECTION -->
      <div id="chartsSection" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-white p-4 rounded-xl shadow-md">
          <h3 class="text-base font-bold mb-2 text-[#093045]">Institutional Enrollmen-Graduate Matrix</h3>
          <canvas id="institutionChart"></canvas>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-md">
          <h3 class="text-base font-bold mb-2 text-[#093045]">Institutional Course Graduate Performance</h3>
          <canvas id="courseYearChart"></canvas>
        </div>
      </div>

    </div>
  </div>

  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
