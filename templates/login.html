<h2>Login</h2>

<form method="POST">
    <input type="text" name="username" placeholder="Username" required><br><br>
    <input type="password" name="password" placeholder="Password" required><br><br>
    <button type="submit">Login</button>
</form>

<button onclick="openReset()">Forgot Password?</button>

<!-- RESET MODAL -->
<div id="resetModal" style="display:none; background:#eee; padding:15px;">
    <form method="POST" action="/forgot_password">
        <input type="email" name="email" placeholder="Enter Email" required>
        <button type="submit">Send Reset Link</button>
        <button type="button" onclick="closeReset()">Cancel</button>
    </form>
</div>

<script>
function openReset(){ document.getElementById("resetModal").style.display="block"; }
function closeReset(){ document.getElementById("resetModal").style.display="none"; }
</script>
