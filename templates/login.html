<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Youth Leaders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
</head>

<body class="bg-[#f5fafc] flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

    <h2 class="text-3xl font-bold text-center text-[#093045] mb-6">
      NBF AYM Records
    </h2>

    {% if error %}
    <div class="bg-[#7d091c] text-white p-3 rounded mb-4 text-center font-semibold">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="space-y-4">

      <div>
        <label class="block mb-1 font-semibold text-gray-600">Username</label>
        <input type="text" name="username" required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#18d9b0]">
      </div>

      <div>
        <label class="block mb-1 font-semibold text-gray-600">Password</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-[#18d9b0]">
      </div>

      <button type="submit"
        class="w-full bg-[#0d755f] text-white py-2 rounded-lg hover:bg-[#1b7a74] transition duration-200 font-semibold">
        Login
      </button>

    </form>

  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
