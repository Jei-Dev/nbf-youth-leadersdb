<!DOCTYPE html>
<html>
<head>
    <title>Graduates</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid black; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
    <!-- Graduates Table -->
    <div class="bg-white rounded-lg shadow p-4 mb-6">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-2">
        <h2 class="text-[#093045] font-bold text-lg">Graduates List</h2>
        <input 
          type="text" 
          id="searchInput" 
          placeholder="Search graduates..." 
          class="border border-gray-300 rounded px-2 py-1 focus:outline-none focus:ring-2 focus:ring-[#18d9b0]"
        >
      </div>
      <div class="overflow-y-auto max-h-96">
        <table id="graduatesTable" class="min-w-full border border-gray-200">
          <thead class="bg-[#f5fafc]">
            <tr>
              <th class="py-2 px-4 border-b text-center">Graduate ID</th>
              <th class="py-2 px-4 border-b text-center">Name</th>
              <th class="py-2 px-4 border-b text-center">Institution</th>
              <th class="py-2 px-4 border-b text-center">Course</th>
              <th class="py-2 px-4 border-b text-center">Graduation Date</th>
              <th class="py-2 px-4 border-b text-center">Action</th>
            </tr>
          </thead>
          <tbody>
            <!-- Populated by JS -->
          </tbody>
        </table>
      </div>
    </div>

</body>
</html>
