<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Users - Youth Leaders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
</head>

<body class="flex bg-[#f5fafc] font-sans">

  {% include "partials/sidebar.html" %}

  <div class="container mx-auto p-2">

    <h2 class="text-2xl font-bold text-[#093045] mb-4">Manage Users</h2>

    <a href="/settings" class="text-gray-500 mb-4 inline-block">
    <p>Add Churchs, Institutions and Courses here.</p>
    </a>

    <!-- Add User Card -->
    <div class="bg-white p-4 rounded-xl shadow mb-6">
      <h3 class="text-xl font-semibold mb-2 text-[#093045]">Add New User</h3>

      <form method="POST" novalidate class="grid md:grid-cols-3 gap-4">
        <input type="hidden" name="action" value="create">

        <div>
          <label class="text-sm font-semibold text-[#093045] mb-1 block"></label>
          <select name="person_id" required
                  class="border border-gray-300 rounded-lg px-4 py-2 w-full focus:ring-2 focus:ring-[#18d9b0] outline-none">
            <option value="">-- Select Person --</option>
            {% for p in persons %}
              <option value="{{ p[0] }}">{{ p[1] }}</option>
            {% endfor %}
          </select>
        </div>

        <input type="text" name="username" placeholder="Username" required
          class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#18d9b0] outline-none">

        <input type="email" name="email" placeholder="Email" required
          class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#18d9b0] outline-none">

        <input type="password" name="password" placeholder="Password" required
          class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#18d9b0] outline-none">

        <select name="role" required
                class="border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#18d9b0] outline-none">
          <option value="Admin">Admin</option>
          <option value="Staff">Staff</option>
          <option value="User">User</option>
        </select>

        <button type="submit"
          class="bg-[#0d755f] text-white rounded-lg hover:bg-[#1b7a74] transition font-semibold">
          Add User
        </button>

      </form>
    </div>

    <!-- Search -->
    <div class="mb-4">
      <input type="text" id="userSearch"
        placeholder="Search users..."
        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-[#18d9b0] outline-none"
        onkeyup="searchTable('userSearch','usersTable')">
    </div>

    <!-- Users Table -->
    <div class="bg-white rounded-xl shadow overflow-y-auto max-h-[400px]">
      <table id="usersTable" class="min-w-full text-center border border-gray-200">
        <thead class="bg-[#f5fafc] text-[#093045] font-bold">
          <tr>
            <th class="py-3 px-4 border-b">User ID</th>
            <th class="py-3 px-4 border-b">Person</th>
            <th class="py-3 px-4 border-b">Username</th>
            <th class="py-3 px-4 border-b">Email</th>
            <th class="py-3 px-4 border-b">Role</th>
            <th class="py-3 px-4 border-b">Action</th>
          </tr>
        </thead>
        <tbody>
          {% for user in users %}
          <tr class="hover:bg-gray-50">
            <td class="py-3 px-4 border-b">{{ user[0] }}</td>
            <td class="py-3 px-4 border-b">{{ user[1] }}</td>
            <td class="py-3 px-4 border-b">{{ user[2] }}</td>
            <td class="py-3 px-4 border-b">{{ user[3] }}</td>
            <td class="py-3 px-4 border-b">{{ user[4] }}</td>
            <td class="py-3 px-4 border-b">
              <button onclick="confirmUserDelete('{{ user[0] }}')"
                      class="bg-[#7d091c] text-white px-3 py-1 rounded hover:bg-[#5a060f] transition">
                Delete
              </button>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script src="{{ url_for('static', filename='js/val.js') }}"></script>
</body>
</html>
