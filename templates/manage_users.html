<!DOCTYPE html>
<html>
<head>
    <title>User Management</title>

    <style>
        body { font-family: Arial; }
        table { border-collapse: collapse; width: 100%; margin-top:20px; }
        th, td { border:1px solid #ddd; padding:8px; text-align:center; }
        th { background:#f2f2f2; }
        button { padding:6px 10px; cursor:pointer; }

        .modal {
            display:none;
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.6);
        }

        .modal-content {
            background:white;
            width:400px;
            margin:10% auto;
            padding:20px;
            border-radius:6px;
        }
    </style>
</head>
<body>

<h2>User Management (Admin Only)</h2>

<button onclick="openModal()">+ Create User</button>

<!-- ================= CREATE USER MODAL ================= -->
<div id="userModal" class="modal">
    <div class="modal-content">
        <h3>Create User</h3>

        <form method="POST">
            <input type="hidden" name="action" value="create">

            <select name="person_id" required>
                <option value="">-- Select Enrolled Member --</option>
                {% for p in persons %}
                <option value="{{ p[0] }}">{{ p[1] }}</option>
                {% endfor %}
            </select><br><br>

            <input type="text" name="username" placeholder="Username" required><br><br>
            <input type="email" name="email" placeholder="Email" required><br><br>
            <input type="password" name="password" placeholder="Password" required><br><br>

            <select name="role" required>
                <option value="Admin">Admin</option>
                <option value="Staff">Staff</option>
                <option value="User">User</option>
            </select><br><br>

            <button type="submit">Create</button>
            <button type="button" onclick="closeModal()">Cancel</button>
        </form>
    </div>
</div>

<!-- ================= USERS TABLE ================= -->

<table>
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Username</th>
    <th>Email</th>
    <th>Role</th>
    <th>Verified</th>
    <th>Actions</th>
</tr>

{% for u in users %}
<tr>
    <td>{{ u[0] }}</td>
    <td>{{ u[1] }}</td>
    <td>{{ u[2] }}</td>
    <td>{{ u[3] }}</td>

    <!-- ROLE EDIT -->
    <td>
        <form method="POST" style="display:inline;">
            <input type="hidden" name="action" value="update_role">
            <input type="hidden" name="user_id" value="{{ u[0] }}">

            <select name="role" onchange="this.form.submit()">
                <option {% if u[4]=='Admin' %}selected{% endif %}>Admin</option>
                <option {% if u[4]=='Staff' %}selected{% endif %}>Staff</option>
                <option {% if u[4]=='User' %}selected{% endif %}>User</option>
            </select>
        </form>
    </td>

    <td>
        {% if u[5] == 1 %} Yes {% else %} No {% endif %}
    </td>

    <td>
        <!-- RESET PASSWORD -->
        <form method="POST" style="display:inline;">
            <input type="hidden" name="action" value="reset_password">
            <input type="hidden" name="user_id" value="{{ u[0] }}">
            <input type="password" name="new_password" placeholder="New Pass" required>
            <button type="submit">Reset</button>
        </form>

        <!-- DELETE -->
        <form method="POST" style="display:inline;">
            <input type="hidden" name="action" value="delete">
            <input type="hidden" name="user_id" value="{{ u[0] }}">
            <button onclick="return confirm('Delete user?')">Delete</button>
        </form>
    </td>
</tr>
{% endfor %}
</table>

<script>
function openModal(){
    document.getElementById("userModal").style.display="block";
}
function closeModal(){
    document.getElementById("userModal").style.display="none";
}
</script>

</body>
</html>
