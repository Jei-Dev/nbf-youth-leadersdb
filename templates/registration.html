<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users - Youth Leaders</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f5fafc] font-sans min-h-screen p-4">

<h2 class="text-2xl font-bold text-[#093045] mb-4">User Management (Admin Only)</h2>

<button onclick="openModal()" class="bg-[#0d755f] text-white px-4 py-2 rounded hover:bg-[#1b7a74] mb-4">+ Create User</button>

<!-- Create User Modal -->
<div id="userModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex justify-center items-center p-4">
  <div class="bg-white rounded-lg p-6 w-full max-w-md space-y-4">
    <h3 class="text-[#093045] font-bold text-lg">Create User</h3>
    <form method="POST" class="space-y-2">
      <input type="hidden" name="action" value="create">
      <select name="person_id" required class="w-full border border-gray-300 rounded p-2">
        <option value="">-- Select Enrolled Member --</option>
        {% for p in persons %}
        <option value="{{ p[0] }}">{{ p[1] }}</option>
        {% endfor %}
      </select>
      <input type="text" name="username" placeholder="Username" required class="w-full border border-gray-300 rounded p-2">
      <input type="email" name="email" placeholder="Email" required class="w-full border border-gray-300 rounded p-2">
      <input type="password" name="password" placeholder="Password" required class="w-full border border-gray-300 rounded p-2">
      <select name="role" required class="w-full border border-gray-300 rounded p-2">
        <option value="Admin">Admin</option>
        <option value="Staff">Staff</option>
        <option value="User">User</option>
      </select>
      <div class="flex justify-end gap-2">
        <button type="submit" class="bg-[#0d755f] text-white px-4 py-2 rounded hover:bg-[#1b7a74]">Create</button>
        <button type="button" onclick="closeModal()" class="border border-[#f5fafc] px-4 py-2 rounded">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- Users Table -->
<div class="overflow-x-auto bg-white rounded-lg shadow">
<table class="min-w-full border border-gray-200">
  <thead class="bg-[#f5fafc] text-[#093045]">
    <tr>
      <th class="py-2 px-4 border-b">ID</th>
      <th class="py-2 px-4 border-b">Name</th>
      <th class="py-2 px-4 border-b">Username</th>
      <th class="py-2 px-4 border-b">Email</th>
      <th class="py-2 px-4 border-b">Role</th>
      <th class="py-2 px-4 border-b">Verified</th>
      <th class="py-2 px-4 border-b">Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for u in users %}
    <tr class="text-center hover:bg-gray-50">
      <td class="py-2 px-4 border-b">{{ u[0] }}</td>
      <td class="py-2 px-4 border-b">{{ u[1] }}</td>
      <td class="py-2 px-4 border-b">{{ u[2] }}</td>
      <td class="py-2 px-4 border-b">{{ u[3] }}</td>
      <td class="py-2 px-4 border-b">
        <form method="POST">
          <input type="hidden" name="action" value="update_role">
          <input type="hidden" name="user_id" value="{{ u[0] }}">
          <select name="role" onchange="this.form.submit()" class="border border-gray-300 rounded p-1">
            <option {% if u[4]=='Admin' %}selected{% endif %}>Admin</option>
            <option {% if u[4]=='Staff' %}selected{% endif %}>Staff</option>
            <option {% if u[4]=='User' %}selected{% endif %}>User</option>
          </select>
        </form>
      </td>
      <td class="py-2 px-4 border-b">{% if u[5]==1 %}Yes{% else %}No{% endif %}</td>
      <td class="py-2 px-4 border-b space-x-1">
        <!-- Reset -->
        <form method="POST" class="inline">
          <input type="hidden" name="action" value="reset_password">
          <input type="hidden" name="user_id" value="{{ u[0] }}">
          <input type="password" name="new_password" placeholder="New Pass" required class="border border-gray-300 rounded p-1">
          <button type="submit" class="bg-[#0d755f] text-white px-2 py-1 rounded hover:bg-[#1b7a74]">Reset</button>
        </form>
        <!-- Delete -->
        <form method="POST" class="inline">
          <input type="hidden" name="action" value="delete">
          <input type="hidden" name="user_id" value="{{ u[0] }}">
          <button onclick="return confirm('Delete user?')" class="bg-[#7d091c] text-white px-2 py-1 rounded hover:bg-[#1b7a74]">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
