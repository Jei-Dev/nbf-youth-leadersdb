<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration - Youth Leaders</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex bg-[#f5fafc] font-sans min-h-screen">

<!-- ================= SIDEBAR ================= -->
{% include "partials/sidebar.html" %}

<!-- ================= MAIN CONTENT ================= -->
<div class="flex-1 p-4 transition-all duration-300 flex flex-col">

  <!-- HEADER -->
  <div class="mb-4 flex-shrink-0">
    <h2 class="text-xl font-semibold text-[#093045]">
      Registration
    </h2>
    <p class="text-gray-500 text-xs mt-1">
      <a href="/manage_users" class="hover:underline">
        Manage user accounts
      </a>
    </p>
  </div>

  <!-- ================= ENROLLMENT FORM ================= -->
  <div class="bg-white rounded-lg shadow p-4 mb-6 overflow-auto flex-1">

    <form method="POST" class="grid grid-cols-1 md:grid-cols-3 gap-3 min-w-[300px]">

      <!-- Personal Info Header -->
      <div class="md:col-span-3 mb-2">
        <h4 class="text-sm font-semibold text-[#093045] border-b pb-1">
          Personal Information
        </h4>
      </div>

      <!-- Personal Info Fields -->
      <div class="flex flex-col">
        <label class="text-xs font-medium text-[#093045] mb-1">First Name</label>
        <input type="text" name="first_name" required
          class="border border-gray-300 rounded p-1 focus:ring-1 focus:ring-[#0d755f] focus:outline-none text-sm">
      </div>

      <div class="flex flex-col">
        <label class="text-xs font-medium text-[#093045] mb-1">Middle Name</label>
        <input type="text" name="middle_name"
          class="border border-gray-300 rounded p-1 focus:ring-1 focus:ring-[#0d755f] focus:outline-none text-sm">
      </div>

      <div class="flex flex-col">
        <label class="text-xs font-medium text-[#093045] mb-1">Last Name</label>
        <input type="text" name="last_name" required
          class="border border-gray-300 rounded p-1 focus:ring-1 focus:ring-[#0d755f] focus:outline-none text-sm">
      </div>

      <div class="flex flex-col">
        <label class="text-xs font-medium text-[#093045] mb-1">Date of Birth</label>
        <input type="date" name="dob" required
          class="border border-gray-300 rounded p-1 focus:ring-1 focus:ring-[#0d755f] focus:outline-none text-sm">
      </div>

      <div class="flex flex-col">
        <label class="text-xs font-medium text-[#093045] mb-1">Gender</label>
        <select name="gender" required
          class="border border-gray-300 rounded p-1 focus:ring-1 focus:ring-[#0d755f] focus:outline-none text-sm">
          <option value="">-- Select Gender --</option>
          <option>Male</option>
          <option>Female</option>
        </select>
      </div>

      <div class="flex flex-col">
        <label class="text-xs font-medium text-[#093045] mb-1">Phone Number</label>
        <input type="text" name="phone"
          class="border border-gray-300 rounded p-1 focus:ring-1 focus:ring-[#0d755f] focus:outline-none text-sm">
      </div>

      <div class="flex flex-col md:col-span-3">
        <label class="text-xs font-medium text-[#093045] mb-1">Email Address</label>
        <input type="email" name="email"
          class="border border-gray-300 rounded p-1 focus:ring-1 focus:ring-[#0d755f] focus:outline-none text-sm w-full">
      </div>

      <!-- Enrollment Info Header -->
      <div class="md:col-span-3 mt-3 mb-2">
        <h4 class="text-sm font-semibold text-[#093045] border-b pb-1">
          Enrollment Information
        </h4>
      </div>

      <!-- Enrollment Info Fields -->
      <div class="flex flex-col">
        <label class="text-xs font-medium text-[#093045] mb-1">Institution</label>
        <select name="institution_id" required
          class="border border-gray-300 rounded p-1 focus:ring-1 focus:ring-[#0d755f] focus:outline-none text-sm">
          <option value="">-- Select Institution --</option>
          {% for inst in institutions %}
          <option value="{{ inst[0] }}">{{ inst[1] }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="flex flex-col">
        <label class="text-xs font-medium text-[#093045] mb-1">Course</label>
        <select name="course_id" required
          class="border border-gray-300 rounded p-1 focus:ring-1 focus:ring-[#0d755f] focus:outline-none text-sm">
          <option value="">-- Select Course --</option>
          {% for course in courses %}
          <option value="{{ course[0] }}">{{ course[1] }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="flex flex-col">
        <label class="text-xs font-medium text-[#093045] mb-1">Enrollment Date</label>
        <input type="date" name="enrollment_date" required
          class="border border-gray-300 rounded p-1 focus:ring-1 focus:ring-[#0d755f] focus:outline-none text-sm">
      </div>

      <div class="md:col-span-3 mt-3">
        <button type="submit"
          class="bg-[#0d755f] text-white px-4 py-1 rounded hover:bg-[#1b7a74] text-sm transition w-full">
          Save Enrollment
        </button>
      </div>

    </form>
  </div>

</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
